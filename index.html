<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ | IoT Smart Control Dashboard</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Style Sheets -->
    <link rel="stylesheet" href="style.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <!-- Background glows -->
    <div class="glow-bg">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
    </div>

    <!-- Login Container -->
    <div class="login-wrapper">
        <div class="login-card" id="loginCard">
            <!-- Brand / Logo Header -->
            <div class="brand-header">
                <div class="icon-box">
                    <i data-lucide="cpu" class="neon-icon"></i>
                </div>
                <h2>IoT CONTROL</h2>
                <p>เข้าสู่ระบบควบคุมอุปกรณ์อัจฉริยะ</p>
            </div>

            <!-- Login Form -->
            <form id="loginForm" onsubmit="handleLogin(event)">
                <!-- Username Input -->
                <div class="input-group">
                    <label for="username">ชื่อผู้ใช้งาน (Username)</label>
                    <div class="input-wrapper">
                        <i data-lucide="user" class="input-icon"></i>
                        <input type="text" id="username" placeholder="ใส่ชื่อผู้ใช้งานของคุณ" required autocomplete="off">
                    </div>
                </div>

                <!-- Password Input -->
                <div class="input-group">
                    <label for="password">รหัสผ่าน (Password)</label>
                    <div class="input-wrapper">
                        <i data-lucide="lock" class="input-icon"></i>
                        <input type="password" id="password" placeholder="ใส่รหัสผ่านของคุณ" required>
                        <button type="button" class="toggle-password" onclick="togglePasswordVisibility()">
                            <i data-lucide="eye" id="eyeIcon"></i>
                        </button>
                    </div>
                </div>

                <!-- Error Message -->
                <div class="error-container" id="errorMessage">
                    <i data-lucide="alert-circle"></i>
                    <span id="errorText">ชื่อผู้ใช้งานหรือรหัสผ่านไม่ถูกต้อง!</span>
                </div>

                <!-- Success Message -->
                <div class="success-container" id="successMessage">
                    <i data-lucide="check-circle-2"></i>
                    <span>เข้าสู่ระบบสำเร็จ กำลังพาคุณไป...</span>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="submit-btn" id="submitBtn">
                    <span>เข้าสู่ระบบ</span>
                    <i data-lucide="arrow-right"></i>
                </button>
            </form>
        </div>
    </div>

    <!-- Script -->
    <script src="login.js"></script>
    <script>
        // Initialize Lucide Icons
        lucide.createIcons();
    </script>
</body>
</html>
