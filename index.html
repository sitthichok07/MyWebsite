<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ | IoT Smart Control Dashboard</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Style Sheets -->
    <link rel="stylesheet" href="style.css?v=2">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <!-- Premium Interactive Background -->
    <div class="glow-bg">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
        <div class="grid-overlay"></div>
    </div>

    <!-- Floating Micro Particles -->
    <div class="particles-container">
        <div class="particle" style="--i:1; --size:8px; --left:10%; --delay:0s; --duration:15s;"></div>
        <div class="particle" style="--i:2; --size:12px; --left:25%; --delay:2s; --duration:18s;"></div>
        <div class="particle" style="--i:3; --size:6px; --left:45%; --delay:4s; --duration:12s;"></div>
        <div class="particle" style="--i:4; --size:14px; --left:60%; --delay:1s; --duration:20s;"></div>
        <div class="particle" style="--i:5; --size:10px; --left:75%; --delay:6s; --duration:14s;"></div>
        <div class="particle" style="--i:6; --size:8px; --left:90%; --delay:3s; --duration:16s;"></div>
    </div>

    <!-- Login Container -->
    <div class="login-wrapper">
        <div class="login-card" id="loginCard">
            <!-- Neon Border Line Glow -->
            <div class="border-glow"></div>
            
            <!-- Brand / Logo Header -->
            <div class="brand-header">
                <div class="icon-box">
                    <i data-lucide="cpu" class="neon-icon"></i>
                </div>
                <h2>IoT CONTROL</h2>
                <div class="glow-bar"></div>
                <p>เข้าสู่ระบบควบคุมอุปกรณ์อัจฉริยะ</p>
            </div>

            <!-- Login Form -->
            <form id="loginForm" onsubmit="handleLogin(event)">
                <!-- Username Input -->
                <div class="input-group">
                    <label for="username">ชื่อผู้ใช้งาน (Username)</label>
                    <div class="input-wrapper">
                        <i data-lucide="user" class="input-icon"></i>
                        <input type="text" id="username" placeholder="ใส่ชื่อผู้ใช้งานของคุณ" required autocomplete="off" autocapitalize="none" autocorrect="off" spellcheck="false">
                        <span class="focus-border"></span>
                    </div>
                </div>

                <!-- Password Input -->
                <div class="input-group">
                    <label for="password">รหัสผ่าน (Password)</label>
                    <div class="input-wrapper">
                        <i data-lucide="lock" class="input-icon"></i>
                        <input type="password" id="password" placeholder="ใส่รหัสผ่านของคุณ" required autocapitalize="none" autocorrect="off" spellcheck="false">
                        <span class="focus-border"></span>
                        <button type="button" class="toggle-password" onclick="togglePasswordVisibility()">
                            <i data-lucide="eye" id="eyeIcon"></i>
                        </button>
                    </div>
                </div>

                <!-- Error Message -->
                <div class="error-container" id="errorMessage">
                    <i data-lucide="alert-circle"></i>
                    <span id="errorText">ชื่อผู้ใช้งานหรือรหัสผ่านไม่ถูกต้อง!</span>
                </div>

                <!-- Success Message -->
                <div class="success-container" id="successMessage">
                    <i data-lucide="check-circle-2"></i>
                    <span>เข้าสู่ระบบสำเร็จ กำลังพาคุณไป...</span>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="submit-btn" id="submitBtn">
                    <span>เข้าสู่ระบบ</span>
                    <i data-lucide="arrow-right"></i>
                </button>
            </form>
        </div>
    </div>

    <!-- Script -->
    <script src="login.js?v=2"></script>
    <script>
        // Initialize Lucide Icons
        lucide.createIcons();
    </script>
</body>
</html>
